<!DOCTYPE html>
<html>
<head>
    <title>Scribble Generator</title>
</head>
<body>

<h2>Upload Image</h2>

<input type="file" id="fileInput"><br><br>

<label>Line Density</label><br>
<input type="range" id="density" min="500" max="3000" value="1200"><br><br>

<label>Smoothness</label><br>
<input type="range" id="smooth" min="1" max="20" value="5"><br><br>

<label>Chaos</label><br>
<input type="range" id="chaos" min="0" max="1" step="0.1" value="0.2"><br><br>

<button onclick="upload()">Generate</button>

<h3>Preview</h3>
<div id="preview">Waiting...</div>

<script>
function upload() {
    const file = document.getElementById("fileInput").files[0];

    const density = document.getElementById("density").value;
    const smooth = document.getElementById("smooth").value;
    const chaos = document.getElementById("chaos").value;

    const formData = new FormData();
    formData.append("image", file);
    formData.append("density", density);
    formData.append("smooth", smooth);
    formData.append("chaos", chaos);

    document.getElementById("preview").innerHTML = "Processing...";

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("preview").innerHTML =
            `<img src="${data.svg_url}?t=${Date.now()}" width="400"/>`;
    });
}
</script>

</body>
</html>
